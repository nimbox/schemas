name: Publish schema

on:
  workflow_call:
    inputs:
      source_repo:
        description: "e.g. nimbox/preferences"
        required: true
        type: string
      source_ref:
        description: "Branch, tag, or SHA to copy from"
        required: true
        type: string
      mappings:
        description: "Newline-separated from:to paths relative to each repo root"
        required: true
        type: string
      commit_message:
        description: "Optional commit message suffix"
        required: false
        type: string
        default: ""
    secrets:
      SCHEMAS_REPO_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: source

      - name: Checkout schemas
        uses: actions/checkout@v4
        with:
          repository: nimbox/schemas
          token: ${{ secrets.SCHEMAS_REPO_TOKEN }}
          path: schemas

      - name: Copy files
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            from="${line%%:*}"
            to="${line#*:}"
            mkdir -p "schemas/$(dirname "$to")"
            cp "source/$from" "schemas/$to"
          done <<< "${{ inputs.mappings }}"

      - name: Commit and push
        working-directory: schemas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          msg="Publish ${SOURCE_REPO}@${SOURCE_REF}"
          [ -n "${COMMIT_SUFFIX}" ] && msg="$msg — ${COMMIT_SUFFIX}"
          git commit -m "$msg"
          git push
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
          COMMIT_SUFFIX: ${{ inputs.commit_message }}
